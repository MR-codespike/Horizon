name: Android Build & Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android App & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # No Gradle wrapper is committed in this project, so setup-gradle can't infer
          # a version from gradlew. AGP 9.1.1 hard-requires Gradle 9.1.0+, so pin explicitly.
          gradle-version: '9.1.0'

      - name: Restore Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore from base64..."
            base64 --decode debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found."
          fi

      - name: Decode Release Keystore
        id: decode_keystore
        run: |
          if [ ! -z "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "Decoding release keystore..."
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks
            echo "keystore_decoded=true" >> $GITHUB_OUTPUT
          else
            echo "No release keystore base64 secret found. Will skip release signing configuration."
            echo "keystore_decoded=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Debug APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: gradle :app:assembleDebug

      - name: Build Release APK
        if: steps.decode_keystore.outputs.keystore_decoded == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -f "my-upload-key.jks" ] && [ ! -z "$STORE_PASSWORD" ] && [ ! -z "$KEY_PASSWORD" ]; then
            echo "Building signed release APK..."
            gradle :app:assembleRelease
          else
            echo "Signing credentials are not fully specified. Skipping signed release build."
            exit 1
          fi

      - name: Rename and Prepare APKs
        run: |
          mkdir -p build-artifacts
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/horizon-debug.apk
            echo "Prepared debug APK."
          fi
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp app/build/outputs/apk/release/app-release.apk build-artifacts/horizon-release.apk
            echo "Prepared signed release APK."
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk build-artifacts/horizon-release-unsigned.apk
            echo "Prepared unsigned release APK."
          fi

      - name: Upload Build Artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: horizon-apks
          path: build-artifacts/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}